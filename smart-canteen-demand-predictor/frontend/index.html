<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Canteen AI Predictor</title>
    <meta name="description" content="Enterprise AI-Powered Food Demand Prediction">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-icon"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                <span>SmartCanteen</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    Predictor
                </a>
                <a href="#" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/></svg>
                    Analytics
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 class="page-title">Demand Forecasting</h1>
                    <p class="page-subtitle">Utilizing Random Forest to predict accurate daily meal requirements.</p>
                </div>
                <div class="user-profile">
                    <span class="status-dot"></span>
                    <span>Admin User</span>
                </div>
            </header>

            <div class="cards-grid">
                <!-- Data Input Card -->
                <div class="card form-card">
                    <div class="card-header">
                        <h2>Input Parameters</h2>
                    </div>
                    
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="day">Day of Week</label>
                            <div class="select-wrapper">
                                <select id="day">
                                    <option>Monday</option>
                                    <option>Tuesday</option>
                                    <option>Wednesday</option>
                                    <option>Thursday</option>
                                    <option>Friday</option>
                                    <option>Saturday</option>
                                    <option>Sunday</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="meal">Service Time</label>
                            <div class="select-wrapper">
                                <select id="meal">
                                    <option>Breakfast</option>
                                    <option>Lunch</option>
                                    <option>Snacks</option>
                                    <option>Dinner</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="item">Menu Item</label>
                            <div class="select-wrapper">
                                <select id="item">
                                    <option>Rice</option>
                                    <option>Biryani</option>
                                    <option>Dosa</option>
                                    <option>Chapati</option>
                                    <option>Idli</option>
                                    <option>Samosa</option>
                                    <option>Puff</option>
                                    <option>Sandwich</option>
                                    <option>Noodles</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="weather">Weather Condition</label>
                            <div class="select-wrapper">
                                <select id="weather">
                                    <option>Sunny</option>
                                    <option>Rainy</option>
                                    <option>Cloudy</option>
                                    <option>Cold</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group input-group-full">
                            <label for="event">Special Context</label>
                            <div class="select-wrapper">
                                <select id="event">
                                    <option>No</option>
                                    <option>Festival</option>
                                    <option>Holiday</option>
                                    <option>Exam</option>
                                    <option>Sports Meet</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button id="predict-btn" class="btn-primary" onclick="predictDemand()">
                        <span id="btn-text">Generate Forecast</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>
                </div>

                <!-- Result Card -->
                <div class="card result-card">
                    <div class="card-header">
                        <h2>Prediction Confidence</h2>
                    </div>
                    
                    <div class="result-display">
                        <div id="result-container" class="empty-state">
                            <svg class="wait-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <p class="result-hint">Awaiting input parameters to generate a demand forecast.</p>
                            <h2 id="result" class="hidden"></h2>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
